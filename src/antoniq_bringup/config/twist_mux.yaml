twist_mux:
  ros__parameters:
    use_stamped: true
    topics:
      joy:
        topic: joy_teleop/cmd_vel
        timeout: 0.5
        priority: 10
      interactive_marker:
        topic: twist_marker_server/cmd_vel
        timeout: 0.5
        priority: 9
      navigation:
        topic: cmd_vel_collision
        timeout: 0.5
        priority: 1
      docking:
        topic: cmd_vel_docking
        timeout: 0.5
        priority: 2
      rotate_heading:
        topic: cmd_vel_rotate_heading
        timeout: 0.5
        priority: 2
    locks:
      e_stop:
        topic   : platform/emergency_stop #e_stop
        timeout : 0.0
        priority: 255